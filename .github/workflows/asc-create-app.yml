name: ASC Create App Record

# One-off: create the App Store Connect app record for the bundle ID so
# altool can resolve the Apple ID during TestFlight upload. Safe to re-run —
# exits cleanly if the app already exists.
on:
  workflow_dispatch:

jobs:
  create-app:
    runs-on: macos-26
    steps:
      - name: Create ASC app record via Spaceship
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          cat > create_app.rb <<'RUBY'
          require 'spaceship'
          require 'base64'

          BUNDLE_ID = 'com.nanoluke.tfldelayrepay'
          SKU = 'tfl-delay-repay'
          NAMES = ['TfL Delay Repay', 'Delay Repay London', 'Nano Delay Repay']

          Spaceship::ConnectAPI.token = Spaceship::ConnectAPI::Token.create(
            key_id: ENV.fetch('ASC_KEY_ID'),
            issuer_id: ENV.fetch('ASC_ISSUER_ID'),
            key: Base64.decode64(ENV.fetch('ASC_KEY_BASE64'))
          )

          existing = Spaceship::ConnectAPI::App.find(BUNDLE_ID)
          if existing
            puts "App record already exists: #{existing.id} (#{existing.name})"
            exit 0
          end

          NAMES.each do |name|
            begin
              app = Spaceship::ConnectAPI::App.create(
                name: name,
                version_string: '1.0.0',
                sku: SKU,
                primary_locale: 'en-GB',
                bundle_id: BUNDLE_ID,
                platforms: ['IOS']
              )
              puts "Created app record: #{app.id} with name '#{name}'"
              exit 0
            rescue => e
              puts "Name '#{name}' failed: #{e.message}"
            end
          end
          abort 'All candidate names failed'
          RUBY
          ruby -e "require 'spaceship'" 2>/dev/null || sudo gem install fastlane --no-document
          ruby create_app.rb
